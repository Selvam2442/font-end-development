<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Alert Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Create Account</h1>
            <p class="text-gray-500 text-sm mt-1">Please fill in the details below.</p>
        </div>

        <form id="registrationForm" class="space-y-6">
            <!-- Name Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Phone Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                <input type="text" id="phone" placeholder="10-digit mobile number" maxlength="10"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98]">
                Register
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const phoneInput = document.getElementById('phone');

        // 1. Real-time Phone Validation (Alert on non-digit input)
        phoneInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (/\D/.test(val)) {
                alert("Validation Error: Phone number must contain digits only!");
                e.target.value = val.replace(/\D/g, ''); 
            }
        });

        // 2. Comprehensive Submission Validation
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            // Name Check
            if (name === "") {
                alert("Validation Error: Please enter your full name.");
                return;
            }

            // Email Check
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email === "") {
                alert("Validation Error: Email address is required.");
                return;
            }
            if (!emailRegex.test(email)) {
                alert("Validation Error: Please enter a valid email address.");
                return;
            }

            // Phone Check (Exactly 10 digits)
            if (phone === "") {
                alert("Validation Error: Mobile number is required.");
                return;
            }
            if (phone.length !== 10) {
                alert("Validation Error: Mobile number must be exactly 10 digits.");
                return;
            }

            // Password Check
            if (password.length < 6) {
                alert("Validation Error: Password must be at least 6 characters long.");
                return;
            }

            // Success
            alert("Success: Registration submitted successfully!");
            form.reset();
        });
    </script>
</body>
</html>
