<!DOCTYPE html>
<html>

<head>
    <title>To-Do List</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 350px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f3f4f6;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete {
            background: #e53e3e;
        }

        .delete:hover {
            background: #c53030;
        }
    </style>

    <script>
        function addTask() {
            let input = document.getElementById("task");

            if (input.value === "") {
                alert("Enter a task");
                return;
            }

            let li = document.createElement("li");
            li.textContent = input.value;

            let delBtn = document.createElement("button");
            delBtn.textContent = "Delete";
            delBtn.className = "delete";

            delBtn.onclick = function () {
                li.remove();
            };

            li.appendChild(delBtn);
            document.getElementById("list").appendChild(li);

            input.value = "";
        }
    </script>
</head>

<body>
    <div class="container">
        <h2>To-Do List</h2>
        <input type="text" id="task" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
        <ul id="list"></ul>
    </div>
</body>
</html>
