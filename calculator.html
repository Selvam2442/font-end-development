<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .calc-btn {
            height: 60px;
            font-size: 1.2rem;
        }

        #screen {
            height: 60px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 15px;
        }

        .container {
            max-width: 350px;
            margin-top: 50px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container bg-white p-4 shadow-sm rounded">
        <input type="text" id="screen" class="form-control" readonly placeholder="0">

        <div class="row g-2">
            <div class="col-6"><button class="btn btn-danger w-100 calc-btn" onclick="clearScreen()">Clear</button>
            </div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn" onclick="add('/')">/</button></div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn" onclick="add('*')">×</button></div>

            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('7')">7</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('8')">8</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('9')">9</button>
            </div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn" onclick="add('-')">-</button></div>

            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('4')">4</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('5')">5</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('6')">6</button>
            </div>
            <div class="col-3"><button class="btn btn-warning w-100 calc-btn" onclick="add('+')">+</button></div>

            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('1')">1</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('2')">2</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('3')">3</button>
            </div>
            <div class="col-3"><button class="btn btn-primary w-100 calc-btn" onclick="solve()">=</button></div>

            <div class="col-9"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('0')">0</button>
            </div>
            <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" onclick="add('.')">.</button>
            </div>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');

        // Adds numbers or operators to the screen
        function add(input) {
            screen.value += input;
        }

        // Clears the entire screen
        function clearScreen() {
            screen.value = "";
        }

        // Calculates the result
        function solve() {
            try {
                screen.value = eval(screen.value);
            } catch (error) {
                screen.value = "Error";
                setTimeout(clearScreen, 1000);
            }
        }
    </script>

</body>

</html>
