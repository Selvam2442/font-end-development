<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Hover Effects</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-wrap: wrap;
            gap: 30px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            padding: 20px;
            max-width: 1000px;
        }

        .box {
            width: 200px;
            height: 150px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* 1. THE GROW EFFECT (Scale) */
        .grow:hover {
            transform: scale(1.1);
            background: var(--primary);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* 2. THE COLOR FILL (Pseudo-element) */
        .fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--secondary);
            transition: 0.4s;
            z-index: -1;
        }

        .fill:hover::before {
            left: 0;
        }

        .fill {
            z-index: 1;
        }

        /* 3. THE 3D ROTATE */
        .rotate:hover {
            transform: perspective(500px) rotateY(20deg) rotateX(10deg);
            border-color: #fbbf24;
            box-shadow: -10px 10px 20px rgba(0,0,0,0.5);
        }

        /* 4. THE GLOW EFFECT */
        .glow:hover {
            box-shadow: 0 0 20px 5px rgba(34, 197, 94, 0.6);
            border-color: #22c55e;
            color: #22c55e;
        }

        /* 5. THE FLOAT (Floating animation) */
        .float:hover {
            transform: translateY(-15px);
        }

        /* 6. GLASSMORPHISM REVEAL */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        p {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box grow"><p>Grow</p></div>
        <div class="box fill"><p>Slide Fill</p></div>
        <div class="box rotate"><p>3D Perspective</p></div>
        <div class="box glow"><p>Neon Glow</p></div>
        <div class="box float"><p>Float Up</p></div>
        <div class="box glass"><p>Glass Blur</p></div>
    </div>

</body>
</html>
